<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Listado de Reservas</h1>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Cliente</th>
            <th>Fecha de Entrada</th>
            <th>Fecha de Salida</th>
            <th>Hotel ID</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="reserva : ${reservas}">
            <td th:text="${reserva.cliente}">Cliente</td>
            <td th:text="${reserva.fechaEntrada}">Fecha de Entrada</td>
            <td th:text="${reserva.fechaSalida}">Fecha de Salida</td>
            <td th:text="${reserva.hotelId}">Hotel ID</td>
            <td>
                <a th:href="@{/web/reservas/{id}(id=${reserva.id})}" class="btn btn-primary btn-sm">Ver Detalle</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
