<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de la Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Detalle de la Reserva</h1>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title" th:text="${reserva.cliente}">Nombre del Cliente</h5>
            <p class="card-text"><strong>Fecha de Entrada:</strong> <span th:text="${reserva.fechaEntrada}">Fecha de Entrada</span></p>
            <p class="card-text"><strong>Fecha de Salida:</strong> <span th:text="${reserva.fechaSalida}">Fecha de Salida</span></p>
            <p class="card-text"><strong>Hotel ID:</strong> <span th:text="${reserva.hotelId}">Hotel ID</span></p>
            <a href="/web/reservas" class="btn btn-secondary">Volver al Listado</a>
        </div>
    </div>
</div>
</body>
</html>
