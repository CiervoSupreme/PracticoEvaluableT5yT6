<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Detalle del Hotel</h1>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title" th:text="${hotel.nombre}">Nombre del Hotel</h5>
            <p class="card-text"><strong>Ciudad:</strong> <span th:text="${hotel.ciudad}">Ciudad</span></p>
            <p class="card-text"><strong>Estrellas:</strong> <span th:text="${hotel.estrellas}">Estrellas</span></p>
            <p class="card-text"><strong>Precio por Noche:</strong> <span th:text="${hotel.precioNoche}">Precio</span></p>
            <a href="/web/hoteles" class="btn btn-secondary">Volver al Listado</a>
        </div>
    </div>
</div>
</body>
</html>
