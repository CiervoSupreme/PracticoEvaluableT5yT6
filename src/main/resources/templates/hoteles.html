<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Hoteles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Listado de Hoteles</h1>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Ciudad</th>
            <th>Estrellas</th>
            <th>Precio/Noche</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="hotel : ${hoteles}">
            <td th:text="${hotel.nombre}">Nombre</td>
            <td th:text="${hotel.ciudad}">Ciudad</td>
            <td th:text="${hotel.estrellas}">Estrellas</td>
            <td th:text="${hotel.precioNoche}">Precio</td>
            <td>
                <a th:href="@{/web/hoteles/{id}(id=${hotel.id})}" class="btn btn-primary btn-sm">Ver Detalle</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
